    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #CBF3F0, #2EC4B6, #fffae3);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    header {
      background: #273e47;
      width: 100%;
      text-align: center;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    #searchBox {
      margin: 20px;
      padding: 12px 20px;
      font-size: 18px;
      width: 60%;
      border: none;
      border-radius: 50px;
      outline: none;
      background-color: rgba(255, 255, 255, 0.1);
      color: white;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      background-image: url('https://img.icons8.com/ios-filled/50/ffffff/search--v1.png');
      background-repeat: no-repeat;
      background-size: 20px;
      background-position: 15px center;
      padding-left: 45px;
    }

    #tree {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 40px;
      padding: 20px;
    }

    .person {
      text-align: center;
      cursor: pointer;
    }

    .person img {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 6px solid #00f5d4;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      transition: transform 0.3s;
    }

    .person:hover img {
      transform: rotatex(360deg);
      transition: 2s;
    }

    .person-name {
      margin-top: 10px;
      font-size: 20px;
      font-weight: bold;
      color: #ffffff;
    }

    #backBtn {
       margin: 20px;
      padding: 12px 20px;
      font-size: 18px;
      width: 20%;
      border: none;
      border-radius: 80px;
      outline: none;
      background-color: rgba(255, 255, 255, 0.1);
      color: white;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      background-repeat: no-repeat;
      background-size: 20px;
      background-position: 15px center;
      padding-left: 45px;
    }

    let history = [];

    function displayPerson(person) {
      const tree = document.getElementById("tree");
      tree.innerHTML = "";
      document.getElementById("backBtn").style.display = history.length ? "inline-block" : "none";

      if (!person.children || person.children.length === 0) {
        const msg = document.createElement("p");
        msg.innerText = "La liste des enfants n’est pas encore complète, elle est en cours d’élaboration.";
        tree.appendChild(msg);
        return;
      }

      person.children.forEach(child => {
        const div = document.createElement("div");
        div.className = "person";
        div.onclick = () => {
          history.push(person);
          displayPerson(child);
        };

        const img = document.createElement("img");
        img.src = child.photo ? "photos/" + child.photo : "ssi.jpg"; 
        

        const name = document.createElement("div");
        name.className = "person-name";
        name.textContent = child.name;

        div.appendChild(img);
        div.appendChild(name);
        tree.appendChild(div);
      });
    }

    function displayRoot() {
      const tree = document.getElementById("tree");
      tree.innerHTML = "";
      history = [];

      const div = document.createElement("div");
      div.className = "person";
      div.onclick = () => {
        history.push(family);
        displayPerson(family);
      };

      const img = document.createElement("img");
      img.src = "ssi.jpg";


      const name = document.createElement("div");
      name.className = "person-name";
      name.textContent = family.name;

      div.appendChild(img);
      div.appendChild(name);
      tree.appendChild(div);

      document.getElementById("backBtn").style.display = "none";
    }

    function goBack() {
      const prev = history.pop();
      if (prev) displayPerson(prev);
      else displayRoot();
    }

    function searchPerson() {
      const query = document.getElementById("searchBox").value.trim().toLowerCase();
      if (!query) return displayRoot();

      const path = findPath(family, query);
      if (path) {
        history = path.slice(0, -1);
        displayPerson(path[path.length - 1]);
      }
    }

    function findPath(node, target, path = []) {
      if (node.name.toLowerCase() === target) return [...path, node];
      if (!node.children) return null;
      for (let child of node.children) {
        const result = findPath(child, target, [...path, node]);
        if (result) return result;
      }
      return null;
    }
    displayRoot();
