<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Les fils Gaïda</title>
  
  <style>
    /* ... vos styles existants ... */
    
    .loading {
      text-align: center;
      padding: 50px;
      font-size: 18px;
      color: #2C3E50;
    }
    
    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #8E44AD;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .error-box {
      background: #f8d7da;
      border: 2px solid #f5c6cb;
      border-radius: 10px;
      padding: 20px;
      margin: 20px;
      text-align: center;
      color: #721c24;
    }
    
    .error-box h3 {
      margin-top: 0;
    }
    
    .error-box button {
      background: #8E44AD;
      color: white;
      border: none;
      padding: 10px 25px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
    }
    
    .error-box button:hover {
      background: #6c3483;
    }
  </style>
</head>
<body>
  <!-- Votre header existant -->
  
  <div id="tree">
    <div class="loading">
      <div class="loader"></div>
      <p>⏳ Chargement des données...</p>
    </div>
  </div>
  
  <!-- Le reste de votre HTML -->

  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js"
      }
    }
  </script>

  <script type="module">
    import { initializeApp } from "firebase/app";
    import { 
      getFirestore, 
      doc, 
      getDoc, 
      setDoc,
      collection,
      query,
      getDocs
    } from "firebase/firestore";

    // Configuration Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyDh1sYrwm5dTG3ktVHprKzE3Gr7fRmxOzfQ",
      authDomain: "gaway-290bc.firebaseapp.com",
      projectId: "gaway-290bc",
      storageBucket: "gaway-290bc.firebasestorage.app",
      messagingSenderId: "1061998444067",
      appId: "1:1061998444067:web:4979bcd90e56f42fd4bb96"
    };

    // Initialisation avec vérification
    let app, db;
    try {
      app = initializeApp(firebaseConfig);
      db = getFirestore(app);
      console.log("✅ Firebase initialisé avec succès");
    } catch (error) {
      console.error("❌ Erreur d'initialisation Firebase:", error);
      showError("Erreur d'initialisation de Firebase. Vérifiez votre configuration.");
    }

    let family = null;
    let history = [];
    let currentPath = [];
    let currentNode = null;

    const treeEl = document.getElementById('tree');
    const backBtn = document.getElementById('backBtn');
    const breadcrumbEl = document.getElementById('breadcrumb');
    const mainHeader = document.getElementById('mainHeader');
    const editBtn = document.getElementById('editBtn');
    const deleteBtn = document.getElementById('deleteBtn');

    // ===== AFFICHER LES ERREURS =====
    function showError(message, details = '') {
      treeEl.innerHTML = `
        <div class="error-box">
          <h3>❌ ${message}</h3>
          ${details ? `<p style="font-size:14px;color:#721c24;">${details}</p>` : ''}
          <button onclick="location.reload()">🔄 Réessayer</button>
          <p style="font-size:12px;margin-top:15px;color:#721c24;">
            Vérifiez que vous êtes connecté à Internet<br>
            et que les règles Firebase autorisent l'accès
          </p>
        </div>
      `;
    }

    // ===== GÉNÉRATEUR D'ID UNIQUE =====
    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
    }

    // ===== CHARGER LA FAMILLE AVEC PLUS DE VÉRIFICATIONS =====
    async function chargerfamille() {
      if (!db) {
        showError("Firebase non initialisé");
        return;
      }

      try {
        console.log("🔍 Tentative de chargement des données...");
        const ref = doc(db, "famille", "bollou_oumar");
        const resultat = await getDoc(ref);

        console.log("📄 Résultat du chargement:", resultat.exists() ? "Document trouvé" : "Document inexistant");

        if (resultat.exists()) {
          family = resultat.data();
          console.log("✅ Données chargées:", family);
          
          // S'assurer que chaque personne a un ID
          const ensureIds = (node) => {
            if (!node.id) node.id = generateId();
            if (node.children) {
              node.children.forEach(child => ensureIds(child));
            }
          };
          ensureIds(family);
          
          currentPath = [family];
          displayRoot();
          showNotification('✅ Données chargées avec succès', 'success');
        } else {
          // Créer le document s'il n'existe pas
          console.log("📝 Création d'un nouveau document...");
          family = {
            id: generateId(),
            name: "Gaïda",
            photo: "",
            children: []
          };
          
          await setDoc(ref, family);
          console.log("✅ Document créé avec succès");
          
          currentPath = [family];
          displayRoot();
          showNotification('📝 Nouvelle famille créée', 'success');
        }
      } catch (error) {
        console.error("❌ Erreur détaillée:", error);
        
        // Afficher des informations plus précises sur l'erreur
        let errorMessage = "Erreur lors du chargement des données";
        let errorDetails = "";
        
        if (error.code === "permission-denied") {
          errorMessage = "⛔ Accès refusé par Firebase";
          errorDetails = "Vérifiez les règles de sécurité dans la console Firebase. Elles doivent autoriser la lecture et l'écriture.";
        } else if (error.code === "unavailable") {
          errorMessage = "🌐 Service Firebase indisponible";
          errorDetails = "Vérifiez votre connexion Internet et réessayez.";
        } else if (error.code === "not-found") {
          errorMessage = "📁 Document non trouvé";
          errorDetails = "Le document 'bollou_oumar' n'existe pas dans la collection 'famille'.";
        } else {
          errorDetails = error.message || "Erreur inconnue";
        }
        
        showError(errorMessage, errorDetails);
      }
    }

    // ===== NOTIFICATIONS =====
    function showNotification(message, type = 'success') {
      const existing = document.querySelector('.notification');
      if (existing) existing.remove();

      const notif = document.createElement('div');
      notif.className = `notification ${type}`;
      notif.textContent = message;
      document.body.appendChild(notif);

      setTimeout(() => {
        notif.style.opacity = '0';
        notif.style.transform = 'translateX(100%)';
        setTimeout(() => notif.remove(), 300);
      }, 3000);
    }

    // ===== SAUVEGARDER LA FAMILLE =====
    async function sauvegarderFamille() {
      try {
        const ref = doc(db, "famille", "bollou_oumar");
        await setDoc(ref, family);
        console.log("✅ Sauvegarde réussie");
        showNotification('✅ Données sauvegardées avec succès', 'success');
        return true;
      } catch(error) {
        console.error("❌ Erreur sauvegarde:", error);
        showNotification('❌ Erreur lors de la sauvegarde: ' + error.message, 'error');
        return false;
      }
    }

    // ===== TROUVER UN NOEUD AVEC SON ID =====
    function findNodeById(node, targetId, parent = null) {
      if (node.id === targetId) {
        return { node, parent };
      }
      if (!node.children) return null;
      for (let child of node.children) {
        const result = findNodeById(child, targetId, node);
        if (result) return result;
      }
      return null;
    }

    // ===== AFFICHER UNE PERSONNE =====
    function displayPerson(person) {
      treeEl.innerHTML = "";
      currentNode = person;
      backBtn.style.display = history.length ? "inline-block" : "none";
      updateBreadcrumb();

      if (person && person.id !== family.id) {
        editBtn.style.display = "inline-block";
        deleteBtn.style.display = "inline-block";
      } else {
        editBtn.style.display = "none";
        deleteBtn.style.display = "none";
      }

      if (!person.children || person.children.length === 0) {
        treeEl.innerHTML = "<p style='text-align:center;padding:40px;'>👶 La liste des enfants n'est pas encore complète.</p>";
        return;
      }

      const searchQuery = document.getElementById('searchBox').value.toLowerCase();
      let childrenToShow = person.children;
      if (searchQuery) {
        childrenToShow = person.children.filter(child => 
          child.name.toLowerCase().includes(searchQuery)
        );
      }

      childrenToShow.forEach(child => {
        const div = document.createElement("div");
        div.className = "person";

        div.onclick = () => {
          history.push(person);
          currentPath.push(child);
          displayPerson(child);
        };

        const img = document.createElement("img");
        img.src = child.photo ? "photos/" + child.photo : "ssi.jpg";
        img.alt = child.name;
        img.onerror = () => { img.src = "ssi.jpg"; };

        const name = document.createElement("div");
        name.className = "person-name";
        name.textContent = child.name;

        div.appendChild(img);
        div.appendChild(name);
        treeEl.appendChild(div);
      });
    }

    // ===== ACCUEIL =====
    function displayRoot() {
      treeEl.innerHTML = "";
      history = [];
      currentPath = [family];
      currentNode = family;
      backBtn.style.display = "none";
      mainHeader.style.display = "block";
      breadcrumbEl.style.display = "none";
      mainHeader.textContent = "🌳 Les fils Gaïda";
      editBtn.style.display = "none";
      deleteBtn.style.display = "none";

      if (!family) return;

      const div = document.createElement("div");
      div.className = "person";

      div.onclick = () => {
        history.push(family);
        displayPerson(family);
      };

      const img = document.createElement("img");
      img.src = "ssi.jpg";

      const name = document.createElement("div");
      name.className = "person-name";
      name.textContent = family.name;

      div.appendChild(img);
      div.appendChild(name);
      treeEl.appendChild(div);
    }

    // ===== RETOUR =====
    window.goBack = function() {
      if (history.length) {
        const prev = history.pop();
        currentPath.pop();
        displayPerson(prev);
      } else {
        displayRoot();
      }
    };

    // ===== FIL D'ARIANE =====
    function updateBreadcrumb() {
      if (currentPath.length <= 1) {
        breadcrumbEl.style.display = "none";
        mainHeader.style.display = "block";
      } else {
        mainHeader.style.display = "none";
        breadcrumbEl.style.display = "block";
        breadcrumbEl.innerHTML = "Enfants de ";
        currentPath.forEach((p, i) => {
          if (i > 0) {
            breadcrumbEl.innerHTML += " ➜ " + p.name;
          }
        });
      }
    }

    // ===== RECHERCHE =====
    window.searchPerson = function() {
      const q = document.getElementById('searchBox').value.toLowerCase();
      if (!q || !family) {
        if (currentNode) {
          displayPerson(currentNode);
        } else {
          displayRoot();
        }
        return;
      }

      const result = findPathToNodeByName(family, q);
      if (result) {
        history = result.slice(0, -1);
        currentPath = result;
        displayPerson(result[result.length - 1]);
      } else {
        if (currentNode) {
          displayPerson(currentNode);
        }
      }
    };

    function findPathToNodeByName(node, searchName, path = []) {
      if (node.name.toLowerCase().includes(searchName)) {
        return [...path, node];
      }
      if (!node.children) return null;
      for (let child of node.children) {
        const result = findPathToNodeByName(child, searchName, [...path, node]);
        if (result) return result;
      }
      return null;
    }

    // ===== AJOUTER =====
    window.openAddModal = function() {
      if (!currentNode) {
        showNotification('❌ Veuillez sélectionner une personne d\'abord', 'error');
        return;
      }
      document.getElementById("addModal").classList.add("active");
      document.getElementById("addName").value = "";
      document.getElementById("addPhoto").value = "";
    };

    window.closeAddModal = function() {
      document.getElementById("addModal").classList.remove("active");
    };

    window.addPerson = async function(e) {
      e.preventDefault();
      const name = document.getElementById("addName").value.trim();
      const photo = document.getElementById("addPhoto").value.trim();

      if (!name) {
        showNotification('❌ Veuillez entrer un nom', 'error');
        return;
      }

      if (!currentNode) {
        showNotification('❌ Aucun noeud sélectionné', 'error');
        return;
      }

      if (currentNode.children && currentNode.children.some(c => c.name === name)) {
        showNotification(`❌ "${name}" existe déjà dans cette liste`, 'warning');
        return;
      }

      const newPerson = {
        id: generateId(),
        name: name,
        photo: photo || "",
        children: []
      };

      if (!currentNode.children) {
        currentNode.children = [];
      }
      currentNode.children.push(newPerson);

      const saved = await sauvegarderFamille();
      if (saved) {
        closeAddModal();
        if (currentNode.id === family.id) {
          displayRoot();
        } else {
          displayPerson(currentNode);
        }
        showNotification(`✅ "${name}" a été ajouté avec succès !`, 'success');
      }
    };

    // ===== MODIFIER =====
    let editingPerson = null;
    let editingParent = null;

    window.openEditModal = function() {
      if (!currentNode || currentNode.id === family.id) {
        showNotification('❌ Sélectionnez une personne à modifier', 'warning');
        return;
      }

      const result = findNodeById(family, currentNode.id);
      if (result) {
        editingPerson = result.node;
        editingParent = result.parent;
        document.getElementById("editName").value = editingPerson.name;
        document.getElementById("editPhoto").value = editingPerson.photo || "";
        document.getElementById("editModal").classList.add("active");
      } else {
        showNotification('❌ Personne non trouvée', 'error');
      }
    };

    window.closeEditModal = function() {
      document.getElementById("editModal").classList.remove("active");
      editingPerson = null;
      editingParent = null;
    };

    window.editPerson = async function(e) {
      e.preventDefault();
      const name = document.getElementById("editName").value.trim();
      const photo = document.getElementById("editPhoto").value.trim();

      if (!name) {
        showNotification('❌ Veuillez entrer un nom', 'error');
        return;
      }

      if (!editingPerson) {
        showNotification('❌ Erreur : aucune personne à modifier', 'error');
        return;
      }

      if (name !== editingPerson.name && editingParent && editingParent.children) {
        if (editingParent.children.some(c => c.name === name && c.id !== editingPerson.id)) {
          showNotification(`❌ "${name}" existe déjà dans cette liste`, 'warning');
          return;
        }
      }

      const oldName = editingPerson.name;
      editingPerson.name = name;
      editingPerson.photo = photo || "";

      if (oldName !== name && currentNode && currentNode.id === editingPerson.id) {
        currentNode.name = name;
      }

      const saved = await sauvegarderFamille();
      if (saved) {
        closeEditModal();
        if (currentNode && currentNode.id === editingPerson.id) {
          displayPerson(editingPerson);
        } else {
          displayPerson(currentNode);
        }
        showNotification(`✅ "${oldName}" modifié en "${name}"`, 'success');
      }
    };

    // ===== SUPPRIMER =====
    let deletingPerson = null;
    let deletingParent = null;

    window.openDeleteModal = function() {
      if (!currentNode || currentNode.id === family.id) {
        showNotification('❌ Sélectionnez une personne à supprimer', 'warning');
        return;
      }

      const result = findNodeById(family, currentNode.id);
      if (result) {
        deletingPerson = result.node;
        deletingParent = result.parent;
        document.getElementById("deleteName").textContent = deletingPerson.name;
        document.getElementById("deleteModal").classList.add("active");
      } else {
        showNotification('❌ Personne non trouvée', 'error');
      }
    };

    window.closeDeleteModal = function() {
      document.getElementById("deleteModal").classList.remove("active");
      deletingPerson = null;
      deletingParent = null;
    };

    window.confirmDelete = async function() {
      if (!deletingPerson || !deletingParent) {
        showNotification('❌ Erreur : aucune personne à supprimer', 'error');
        return;
      }

      const nameToDelete = deletingPerson.name;

      if (deletingParent.children) {
        deletingParent.children = deletingParent.children.filter(
          child => child.id !== deletingPerson.id
        );
      }

      const saved = await sauvegarderFamille();
      if (saved) {
        closeDeleteModal();
        currentPath = [family];
        
        const parentCheck = findNodeById(family, deletingParent.id);
        if (parentCheck) {
          currentPath = findPathToNodeById(family, deletingParent.id) || [family];
          displayPerson(parentCheck.node);
        } else {
          displayRoot();
        }
        showNotification(`🗑️ "${nameToDelete}" a été supprimé !`, 'success');
      }
    };

    function findPathToNodeById(node, targetId, path = []) {
      if (node.id === targetId) {
        return [...path, node];
      }
      if (!node.children) return null;
      for (let child of node.children) {
        const result = findPathToNodeById(child, targetId, [...path, node]);
        if (result) return result;
      }
      return null;
    }

    // ===== HISTOIRE =====
    window.openHistoryModal = function() {
      document.getElementById("historyModal").classList.add("active");
    };

    window.closeHistoryModal = function() {
      document.getElementById("historyModal").classList.remove("active");
    };

    // ===== LANCER LE CHARGEMENT =====
    chargerfamille();

    // ===== EXPOSER LES FONCTIONS =====
    window.findNodeById = findNodeById;
  </script>
</body>
</html>
